dependencies:
  idf: ">=5.4"
  esp_video: ">=2.2,<3.0"
  example_video_common:
    override_path: "../components/example_video_common"
  protocol_examples_common:
    path: ${IDF_PATH}/examples/common_components/protocol_examples_common
  espressif/mdns: "^1.0.3"
  espressif/esp_wifi_remote:
    matches:
      - if: "idf_version >= 6.0"
        version: ">=1.6,<2.0"
      - if: "idf_version < 6.0"
        version: "*"
  espressif/cjson:
    version: "^1.7.15"
    rules:
      - if: "idf_version >= 6.0"